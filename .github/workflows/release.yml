name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild URUManager.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutDir=publish\

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: URU Manager ${{ github.ref_name }}
          files: publish/URUManager.exe
          draft: false
          prerelease: false
